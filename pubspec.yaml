name: static_licenses
description: "A CLI tool to statically extract and compile open-source licenses into a zero-dependency Dart file for zero runtime overhead."
version: 1.0.0
homepage: https://github.com/PatrickChrestin/static_licenses

environment:
  sdk: ^3.11.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  yaml: ^3.1.3
  path: ^1.8.0
  args: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.29.0

executables:
  static_licenses: generate